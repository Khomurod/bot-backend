services:
  - type: web
    name: driver-feedback-bot
    runtime: node
    buildCommand: pip install -r leads-bot/requirements.txt && npm install && cd admin && npm install && npm run build && cd .. && cd samsara-integration && npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      # ─── bot-backend (Node.js) ───
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MANAGEMENT_GROUP_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EMPLOYEE_GROUP_ID
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_LOGIN_CONFIG_ID
        sync: false
      - key: META_REQUESTED_PERMISSIONS
        sync: false
      - key: FACEBOOK_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: LEADS_INTERNAL_SHARED_SECRET
        sync: false
      # ─── Leads-Bot (Python) ───
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: LEADS_BOT_PORT
        sync: false
      - key: RC_CLIENT_ID
        sync: false
      - key: RC_CLIENT_SECRET
        sync: false
      - key: RC_JWT_TOKEN
        sync: false
      - key: RC_FROM_NUMBER
        sync: false
      # ─── Samsara Alert Bot ───
      - key: SAMSARA_BOT_TOKEN
        sync: false
      - key: SAMSARA_API_KEY
        sync: false
      - key: SAMSARA_PORT
        value: "3002"
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
