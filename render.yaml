services:
  - type: web
    name: driver-feedback-bot
    env: node
    buildCommand: npm install
    startCommand: node index.js
    # Same handler as GET /health (cron-friendly short URL).
    healthCheckPath: /api/health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MANAGEMENT_GROUP_ID
        sync: false
      - key: EMPLOYEE_GROUP_ID
        sync: false
      - key: MEDIA_STORAGE_CHAT_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: META_LOGIN_CONFIG_ID
        sync: false
      - key: META_REQUESTED_PERMISSIONS
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: FACEBOOK_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: LEADS_INTERNAL_SHARED_SECRET
        sync: false
      - key: RC_CLIENT_ID
        sync: false
      - key: RC_CLIENT_SECRET
        sync: false
      - key: RC_JWT_TOKEN
        sync: false
      - key: RC_FROM_NUMBER
        sync: false
      - key: SAMSARA_API_KEY
        sync: false
      - key: SAMSARA_API_BASE
        value: https://api.samsara.com
      - key: NODE_OPTIONS
        # Main process heap cap. Kept well under the 512MB instance so the
        # spawned samsara (Node child) and leads-bot (Python child) have room.
        value: --max-old-space-size=300

  - type: web
    name: samsara-poller
    env: node
    buildCommand: cd samsara-integration && npm install
    startCommand: cd samsara-integration && node index.js
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: SAMSARA_API_KEY
        sync: false
      - key: SAMSARA_API_BASE
        value: https://api.samsara.com
      - key: DATABASE_URL
        sync: false
      - key: MANAGEMENT_GROUP_ID
        sync: false
      - key: EMPLOYEE_GROUP_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: NODE_OPTIONS
        value: --max-old-space-size=400

  - type: web
    name: facebook-leads-engine
    env: python
    buildCommand: cd leads-bot && pip install -r requirements.txt
    startCommand: cd leads-bot && python main.py
    healthCheckPath: /health
    envVars:
      # Set this to the Main Hub's public HTTPS Render URL.
      - key: LOCAL_API_BASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: LEADS_INTERNAL_SHARED_SECRET
        sync: false
      - key: RC_CLIENT_ID
        sync: false
      - key: RC_CLIENT_SECRET
        sync: false
      - key: RC_JWT_TOKEN
        sync: false
      - key: RC_FROM_NUMBER
        sync: false
