services:
  - type: web
    name: driver-feedback-bot
    env: node
    buildCommand: npm install
    startCommand: node index.js
    # Same handler as GET /health (cron-friendly short URL).
    healthCheckPath: /api/health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MANAGEMENT_GROUP_ID
        sync: false
      - key: EMPLOYEE_GROUP_ID
        sync: false
      - key: MEDIA_STORAGE_CHAT_ID
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: META_LOGIN_CONFIG_ID
        sync: false
      - key: META_REQUESTED_PERMISSIONS
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: FACEBOOK_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: LEADS_INTERNAL_SHARED_SECRET
        sync: false
      - key: RC_CLIENT_ID
        sync: false
      - key: RC_CLIENT_SECRET
        sync: false
      - key: RC_JWT_TOKEN
        sync: false
      - key: RC_FROM_NUMBER
        sync: false
      - key: SAMSARA_API_KEY
        sync: false
      - key: SAMSARA_API_BASE
        value: https://api.samsara.com
      # Driver Raise Approval (75¢/mile) — Gmail App Password OTP channel.
      # Primary config is the admin panel (stored encrypted); these are an
      # optional fallback used only when the panel has no credentials.
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: NODE_OPTIONS
        # Main process heap cap. Kept well under the 512MB instance so the
        # leads-bot (Python child) has room. The Samsara safety-event poller
        # is NO LONGER part of this repo — it runs as its own separate Render
        # service from github.com/Khomurod/samsara-integration, which is what
        # freed the memory that used to cause OOM kills.
        # 256 (was 300) leaves more OS/GC headroom to avoid OOM kills.
        value: --max-old-space-size=256
      # Limit glibc malloc arenas to reduce native heap fragmentation in the
      # main Node process (the Python child already sets this).
      - key: MALLOC_ARENA_MAX
        value: "2"

  # NOTE: The `samsara-poller` service that used to live here has moved to its
  # own repository (github.com/Khomurod/samsara-integration) and is deployed
  # from there. It talks to this hub only through the shared DATABASE_URL (the
  # `groups` table) and the shared Telegram bot tokens — no in-repo link needed.

  - type: web
    name: facebook-leads-engine
    env: python
    buildCommand: cd leads-bot && pip install -r requirements.txt
    startCommand: cd leads-bot && python main.py
    healthCheckPath: /health
    envVars:
      # Set this to the Main Hub's public HTTPS Render URL.
      - key: LOCAL_API_BASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: LEADS_INTERNAL_SHARED_SECRET
        sync: false
      - key: RC_CLIENT_ID
        sync: false
      - key: RC_CLIENT_SECRET
        sync: false
      - key: RC_JWT_TOKEN
        sync: false
      - key: RC_FROM_NUMBER
        sync: false
